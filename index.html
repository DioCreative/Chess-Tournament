<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Swiss Tournament Standings</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

    <!-- Botão pequeno de Reset no canto superior direito -->
    <button id="resetBtn" class="action-btn btn-danger reset-top-right" onclick="resetTournament()" title="Resetar Torneio">⚠️ Reset</button>

    <!-- Main Tournament View -->
    <div class="layout-wrapper" id="mainLayout">
        <div class="left-column">
            <div class="header">
                <h2>⚔️ Emparelhamentos</h2>
            </div>
            <div class="round-controls">
                <button id="generateRoundBtn" onclick="generatePairings()">Gerar Próxima Ronda</button>
                <p id="roundInfo" style="color: var(--text-muted); font-size: 0.9rem; margin-top: 10px;">Ronda: 0 / 5</p>
                
                <!-- Botão Pódio -->
                <button id="podiumBtn" onclick="showPodium()" style="display: none; background-color: #f1c40f; color: #000; margin-top: 15px;">🏆 Ver Pódio</button>
            </div>
            <div id="pairingsList" class="pairings-list">
                <p style="text-align: center; color: var(--text-muted); margin-top: 20px;">Adiciona pelo menos 6 jogadores e gera a 1.ª ronda.</p>
            </div>
        </div>

        <div class="right-column container">
            <div class="header">
                <h1>🏆 Live Standings</h1>
                <form class="add-player-form" id="addForm">
                    <input type="text" id="playerName" placeholder="Nome do Jogador" required autocomplete="off">
                    <button type="submit">Adicionar</button>
                </form>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Player</th>
                        <th>Pts</th>
                        <th>Buc</th>
                        <th>Jogos</th>
                        <th>Edit Pts</th>
                        <th>Edit Jogos</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <!-- Linhas injetadas via JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Podium View (Escondida por defeito) -->
    <div id="podiumView" class="podium-view" style="display: none;">
        <h1 style="font-size: 2.5rem; margin-bottom: 2rem;">🏆 Vencedores do Torneio 🏆</h1>
        <div class="podium">
            <!-- 2º Lugar -->
            <div class="podium-spot second-place">
                <div class="podium-name" id="podium-2-name">-</div>
                <div class="step step-2">
                    <span class="place-number">2º</span>
                    <span class="prize">1 circuito sê como a água</span>
                </div>
            </div>
            <!-- 1º Lugar -->
            <div class="podium-spot first-place">
                <div class="podium-name" id="podium-1-name" style="color: #f1c40f; font-size: 1.5rem;">-</div>
                <div class="step step-1">
                    <span class="place-number">1º</span>
                    <span class="prize">1 Saudade</span>
                </div>
            </div>
            <!-- 3º Lugar -->
            <div class="podium-spot third-place">
                <div class="podium-name" id="podium-3-name">-</div>
                <div class="step step-3">
                    <span class="place-number">3º</span>
                    <span class="prize">1 lágrima</span>
                </div>
            </div>
        </div>
        <button onclick="closePodium()" style="margin-top: 4rem; background-color: #403d39;">Voltar ao Dashboard</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
